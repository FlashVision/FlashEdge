# FlashEdge — OpenVINO Export Configuration

model:
  path: "pretrained/model.pth"
  architecture: "efficientnet_b0"
  num_classes: 1000

export:
  format: "openvino"
  output_dir: "exported/openvino/"
  input_shape: [1, 3, 224, 224]
  compress_to_fp16: true
  device: "CPU"

optimization:
  int8_quantization: true
  calibration_data: "data/calibration/"
  num_calibration_samples: 300
  pot_algorithm: "DefaultQuantization"

profiling:
  enabled: true
  device: "CPU"
  warmup_runs: 10
  benchmark_runs: 100
