# FlashEdge — ONNX Mobile Export Configuration

model:
  path: "pretrained/model.pth"
  architecture: "mobilenetv3_small"
  num_classes: 1000

export:
  format: "onnx"
  output: "exported/model_mobile.onnx"
  opset_version: 17
  input_shape: [1, 3, 224, 224]
  dynamic_axes:
    input: {0: "batch_size"}
    output: {0: "batch_size"}
  simplify: true
  optimize: true
  fp16: false

optimization:
  quantize: false
  prune: false

profiling:
  enabled: true
  device: "cpu"
  warmup_runs: 10
  benchmark_runs: 100
